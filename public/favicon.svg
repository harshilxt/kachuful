<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2ddae"/>
      <stop offset="0.55" stop-color="#d4a574"/>
      <stop offset="1" stop-color="#8d6438"/>
    </linearGradient>
  </defs>

  <!-- gold badge -->
  <rect width="48" height="48" rx="11" fill="url(#g)"/>

  <!-- back card (spade), tilted left -->
  <g transform="rotate(-15 20 25)">
    <rect x="9" y="11" width="19" height="26" rx="3" fill="#FBF7EE" stroke="#0b0f14" stroke-opacity="0.2"/>
    <text x="18.5" y="30" font-family="'Segoe UI Symbol','Noto Sans Symbols2',serif" font-size="16" text-anchor="middle" fill="#13181f">&#9824;</text>
  </g>

  <!-- front card (heart), tilted right -->
  <g transform="rotate(15 28 25)">
    <rect x="20" y="11" width="19" height="26" rx="3" fill="#FFFFFF" stroke="#0b0f14" stroke-opacity="0.2"/>
    <text x="29.5" y="30" font-family="'Segoe UI Symbol','Noto Sans Symbols2',serif" font-size="16" text-anchor="middle" fill="#e0334a">&#9829;</text>
  </g>
</svg>
